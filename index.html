<!DOCTYPE html>

  <script>
    // Fallback JavaScript redirect
    try {
      const params = new URLSearchParams(window.location.search);
      const queryString = params.toString() ? '?' + params.toString() : '';
      window.location.href = 'https://leon4gr45-n8n.hf.space/rest/oauth2-credential/callback' + queryString;
    } catch (e) {
      // Fallback to meta refresh if JS fails
      document.location = 'https://leon4gr45-n8n.hf.space/rest/oauth2-credential/callback';
    }
  </script>
</head>
