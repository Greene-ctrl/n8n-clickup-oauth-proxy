<head>
  <meta charset="utf-8">
  <title>n8n Proxy Redirect</title>
  <script>
    // Debug: log what we received
    console.log('Original URL:', window.location.href);
    console.log('Path:', window.location.pathname);
    
    // Target n8n instance (Localhost for current setup)
    const N8N_TARGET = 'http://localhost:5678';
    
    // Determine the target path
    const path = window.location.pathname;
    const queryString = window.location.search;
    
    let targetPath = '/rest/oauth2-credential/callback'; // Default for OAuth
    
    // Check if it's a webhook
    if (path.startsWith('/webhook/') || path.startsWith('/webhook-test/')) {
      targetPath = path;
      console.log('Detected Webhook path');
    } else {
      console.log('Defaulting to OAuth callback path');
    }
    
    const finalUrl = N8N_TARGET + targetPath + queryString;
    
    console.log('Redirecting to:', finalUrl);
    
    // Perform redirect
    window.location.href = finalUrl;
    
    // Fallback JavaScript redirect
    setTimeout(() => {
      window.location.href = finalUrl;
    }, 1000);
  </script>
</head>
<body>
  <p>Redirecting to n8n instance...</p>
  <p>Target: <span id="display-url">...</span></p>
  <p>If you are not redirected automatically, <a id="manual-link" href="#">click here</a>.</p>
  <script>
    const path = window.location.pathname;
    const queryString = window.location.search;
    let targetPath = (path.startsWith('/webhook/') || path.startsWith('/webhook-test/')) ? path : '/rest/oauth2-credential/callback';
    const finalUrl = 'http://localhost:5678' + targetPath + queryString;
    
    document.getElementById('display-url').textContent = finalUrl;
    document.getElementById('manual-link').href = finalUrl;
  </script>
</body>
