<head>
  <meta charset="utf-8">
  <title>ClickUp OAuth Redirect</title>
  <meta http-equiv="refresh" content="0;url=https://leon4gr45-n8n.hf.space/rest/oauth2-credential/callback">
  <script>
    // Debug: log what we received
    console.log('Original URL:', window.location.href);
    console.log('Search params:', window.location.search);
    
    // Extract query parameters from the current URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    
    console.log('Code:', code);
    console.log('State:', state);
    
    // Redirect to n8n base URL - n8n handles the OAuth callback internally
    // n8n expects: https://domain/rest/oauth2-credential/callback?code=...&state=...
    const queryString = window.location.search;
    window.location.href = 'https://leon4gr45-n8n.hf.space' + queryString;
    // Fallback JavaScript redirect
    try {
      const params = new URLSearchParams(window.location.search);
      const queryString = params.toString() ? '?' + params.toString() : '';
      window.location.href = 'https://leon4gr45-n8n.hf.space/rest/oauth2-credential/callback' + queryString;
    } catch (e) {
      // Fallback to meta refresh if JS fails
      document.location = 'https://leon4gr45-n8n.hf.space/rest/oauth2-credential/callback';
    }
  </script>
</head>
<body>
