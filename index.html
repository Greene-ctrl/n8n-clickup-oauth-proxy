<head>
  <meta charset="utf-8">
  <title>n8n OAuth Redirect</title>
  <script>
    // Debug: log what we received
    console.log('Original URL:', window.location.href);
    console.log('Search params:', window.location.search);
    
    // Extract query parameters from the current URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    
    console.log('Code:', code);
    console.log('State:', state);
    
    // Target n8n instance (Localhost for current setup)
    const N8N_TARGET = 'http://localhost:5678';
    
    // Redirect to local n8n instance
    const queryString = window.location.search;
    const finalUrl = N8N_TARGET + '/rest/oauth2-credential/callback' + queryString;
    
    console.log('Redirecting to:', finalUrl);
    window.location.href = finalUrl;
    
    // Fallback JavaScript redirect
    setTimeout(() => {
      window.location.href = finalUrl;
    }, 1000);
  </script>
</head>
<body>
  <p>Redirecting to n8n at http://localhost:5678...</p>
  <p>If you are not redirected automatically, <a id="manual-link" href="#">click here</a>.</p>
  <script>
    document.getElementById('manual-link').href = 'http://localhost:5678/rest/oauth2-credential/callback' + window.location.search;
  </script>
</body>
